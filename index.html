<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Corte</title>
  <meta name="description" content="Agende seu corte de cabelo de forma simples e rápida.">
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            brand: {
              50: '#eff6ff',
              100: '#dbeafe',
              500: '#3b82f6',
              600: '#2563eb',
            },
            soft: {
              surface: '#ffffff',
              background: '#f8fafc',
              text: '#334155',
            }
          },
          boxShadow: {
            'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
            'inner-soft': 'inset 0 2px 4px 0 rgba(0, 0, 0, 0.05)',
          },
          borderRadius: {
            '3xl': '1.5rem',
          }
        }
      }
    }
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        // Manually construct the absolute URL for sw.js to bypass <base> tag issues
        // and avoid 'Invalid URL' errors with new URL() in some environments.
        const path = window.location.pathname;
        const basePath = path.substring(0, path.lastIndexOf('/') + 1);
        const swUrl = window.location.origin + basePath + 'sw.js';
        
        navigator.serviceWorker.register(swUrl)
          .then(registration => {
            console.log('ServiceWorker registration successful');
          })
          .catch(err => {
            console.warn('ServiceWorker registration failed: ', err);
          });
      });
    }
  </script>
  <style>
    body { background-color: #f8fafc; color: #334155; }
    /* Smooth scrolling */
    html { scroll-behavior: smooth; }
  </style>
<script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
  <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
